spring.application.name=oss-es-importer
server.port=8080

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/import_demo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:/mapper/*.xml
mybatis.type-aliases-package=com.example.importer.domain
mybatis.configuration.map-underscore-to-camel-case=true

oss.endpoint=http://oss-cn-hangzhou.aliyuncs.com
oss.access-key-id=your-access-key-id
oss.access-key-secret=your-access-key-secret
oss.bucket-name=your-bucket

es.host=127.0.0.1
es.port=9200
es.scheme=http
es.connect-timeout=5000
es.socket-timeout=60000
es.bulk-actions=500

logging.level.com.example.importer=INFO
